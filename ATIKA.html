<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ATIKA — AI Mascot</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   ATIKA — DESIGN TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --white:     #ffffff;
  --pearl:     #f0f4f8;
  --pearl2:    #dde6ef;
  --pearl3:    #c8d5e3;
  --blue-eye:  #5dd9f5;
  --blue-glow: #a8edfa;
  --blue-dark: #1eaac8;
  --screen:    #0a0e1a;
  --screen2:   #141b2e;
  --smile:     #5dd9f5;
  --ear:       #b8d4ea;
  --shadow:    rgba(100,160,210,0.22);
  --bg:        transparent;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 0 32px}

/* ═══════════════════════════════════════════════════════
   STAGE
═══════════════════════════════════════════════════════ */
.header{text-align:center;margin:18px 0 4px}
.header h1{font-size:32px;font-weight:900;letter-spacing:.2em;color:#1a3a5c;text-shadow:0 2px 14px rgba(93,217,245,.18)}
.header p{font-size:11px;letter-spacing:.22em;color:#7ab8d8;text-transform:uppercase;margin-top:3px}
.state-display{font-size:15px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;min-height:24px;margin:6px 0 10px;transition:color .3s}

.stage{position:relative;width:300px;height:360px;display:flex;align-items:center;justify-content:center}

   KEYFRAMES — BODY
═══════════════════════════════════════════════════════ */

@keyframes K-shadow  {0%,100%{transform:scaleX(1);opacity:.14}50%{transform:scaleX(.76);opacity:.08}}

@keyframes AR-d8    {0%,100%{transform:rotate(32deg) }33%{transform:rotate(138deg)}66%{transform:rotate(-15deg)}}
@keyframes AR-talk  {0%,100%{transform:rotate(-24deg)}40%{transform:rotate(14deg)}70%{transform:rotate(-34deg)}}

@keyframes AR-happy {0%,100%{transform:rotate(108deg)}50%{transform:rotate(68deg)}}

═══════════════════════════════════════════════════════ */

@keyframes EY-sad    {0%,100%{ry:7px; fill:#8ec5dc}50%{ry:5px; fill:#6eb0cc}}

/* ═══════════════════════════════════════════════════════
   STATE → ANIMATION MAPS
═══════════════════════════════════════════════════════ */
/* IDLE */
.s-idle  .BD{animation:K-idle   2.9s ease-in-out infinite}
.s-idle  .AL{animation:AL-idle  2.9s ease-in-out infinite}
.s-idle  .AR{animation:AR-idle  2.9s ease-in-out infinite}
.s-idle  .EL,.s-idle  .ER{animation:EY-blink 4.2s ease-in-out infinite}
.s-idle  .SH{animation:K-shadow 2.9s ease-in-out infinite}

/* DANCE 1 */
.s-d1 .BD{animation:K-d1 .88s ease-in-out infinite}
.s-d1 .AL{animation:AL-d1 .88s ease-in-out infinite}
.s-d1 .AR{animation:AR-d1 .88s ease-in-out infinite}
.s-d1 .EL,.s-d1 .ER{animation:EY-happy .88s ease-in-out infinite}
.s-d1 .M {animation:M-vhappy .88s ease-in-out infinite}

/* DANCE 2 */
.s-d2 .BD{animation:K-d2 .72s ease-in-out infinite}
.s-d2 .AL{animation:AL-d2 .72s ease-in-out infinite}
.s-d2 .AR{animation:AR-d2 .72s ease-in-out infinite}
.s-d2 .EL,.s-d2 .ER{animation:EY-blink 1.44s ease-in-out infinite}
.s-d2 .M {animation:M-happy .72s ease-in-out infinite}

/* DANCE 3 */
.s-d3 .BD{animation:K-d3 1.12s ease-in-out infinite}
.s-d3 .AL{animation:AL-d3 1.12s ease-in-out infinite}
.s-d3 .AR{animation:AR-d3 1.12s ease-in-out infinite}
.s-d3 .EL,.s-d3 .ER{animation:EY-blink 2.24s ease-in-out infinite}
.s-d3 .M {animation:M-happy 1.12s ease-in-out infinite}

/* DANCE 4 */
.s-d4 .BD{animation:K-d4 .8s ease-in-out infinite}
.s-d4 .AL{animation:AL-d4 .8s ease-in-out infinite}
.s-d4 .AR{animation:AR-d4 .8s ease-in-out infinite}
.s-d4 .EL,.s-d4 .ER{animation:EY-excite .8s ease-in-out infinite}
.s-d4 .M {animation:M-vhappy .8s ease-in-out infinite}

/* DANCE 5 */
.s-d5 .BD{animation:K-d5 .84s linear infinite}
.s-d5 .AL{animation:AL-d5 .84s linear infinite}
.s-d5 .AR{animation:AR-d5 .84s linear infinite}

/* DANCE 6 */
.s-d6 .BD{animation:K-d6 .92s ease-in-out infinite}
.s-d6 .AL{animation:AL-d6 .92s ease-in-out infinite}
.s-d6 .AR{animation:AR-d6 .92s ease-in-out infinite}
.s-d6 .EL,.s-d6 .ER{animation:EY-happy .92s ease-in-out infinite}
.s-d6 .M {animation:M-happy .92s ease-in-out infinite}

/* DANCE 7 */
.s-d7 .BD{animation:K-d7 .78s ease-in-out infinite}
.s-d7 .AL{animation:AL-d7 .78s ease-in-out infinite}
.s-d7 .AR{animation:AR-d7 .78s ease-in-out infinite}
.s-d7 .EL,.s-d7 .ER{animation:EY-excite .78s ease-in-out infinite}
.s-d7 .M {animation:M-vhappy .78s ease-in-out infinite}

/* DANCE 8 */
.s-d8 .BD{animation:K-d8 .68s ease-in-out infinite}
.s-d8 .AL{animation:AL-d8 .68s ease-in-out infinite}
.s-d8 .AR{animation:AR-d8 .68s ease-in-out infinite}
.s-d8 .EL,.s-d8 .ER{animation:EY-excite .68s ease-in-out infinite}
.s-d8 .M {animation:M-laugh .56s ease-in-out infinite}

/* TALK */
.s-talk .BD{animation:K-talk .66s ease-in-out infinite}
.s-talk .AL{animation:AL-talk .66s ease-in-out infinite}
.s-talk .AR{animation:AR-talk .66s ease-in-out infinite}
.s-talk .EL,.s-talk .ER{animation:EY-blink 3.2s ease-in-out infinite}
.s-talk .M {animation:M-talk .52s ease-in-out infinite}

/* THINK */
.s-think .BD{animation:K-think 2.3s ease-in-out infinite}
.s-think .AL{animation:AL-think 2.3s ease-in-out infinite}
.s-think .AR{animation:AR-think 2.3s ease-in-out infinite}
.s-think .EL{animation:EY-scanL 1.9s ease-in-out infinite}
.s-think .ER{animation:EY-scanR 1.9s .32s ease-in-out infinite}

/* HAPPY */
.s-happy .BD{animation:K-happy .82s ease-in-out infinite}
.s-happy .AL{animation:AL-happy .82s ease-in-out infinite}
.s-happy .AR{animation:AR-happy .82s ease-in-out infinite}
.s-happy .EL,.s-happy .ER{animation:EY-happy .82s ease-in-out infinite}
.s-happy .M {animation:M-happy .82s ease-in-out infinite}

/* VERY HAPPY */
.s-vhappy .BD{animation:K-vhappy .68s ease-in-out infinite}
.s-vhappy .AL{animation:AL-clap .68s ease-in-out infinite}
.s-vhappy .AR{animation:AR-clap .68s ease-in-out infinite}
.s-vhappy .EL,.s-vhappy .ER{animation:EY-excite .68s ease-in-out infinite}
.s-vhappy .M {animation:M-vhappy .68s ease-in-out infinite}

/* SAD */
.s-sad .BD{animation:K-sad 2.1s ease-in-out infinite}
.s-sad .AL{animation:AL-sad 2.1s ease-in-out infinite}
.s-sad .AR{animation:AR-sad 2.1s ease-in-out infinite}
.s-sad .EL,.s-sad .ER{animation:EY-sad 2.1s ease-in-out infinite}

function go(s, label, color) {
  var d = DATA[s] || DATA.idle;
  // Apply CSS class
  document.getElementById('sv').className.baseVal = 's-' + s;
  // Mouth path
  document.getElementById('mo').setAttribute('d', d.m);
  // Overlays
  document.getElementById('oN').style.opacity = d.N ? '1' : '0';
  document.getElementById('oH').style.opacity = d.H ? '1' : '0';
  document.getElementById('oQ').style.opacity = d.Q ? '1' : '0';
  document.getElementById('oS').style.opacity = d.S ? '1' : '0';
  document.getElementById('oZ').style.opacity = d.Z ? '1' : '0';
  document.getElementById('oT').style.opacity = d.T ? '1' : '0';
  document.getElementById('oP').style.opacity = d.P ? '1' : '0';
  document.getElementById('oC').style.opacity = d.C ? '1' : '0';
  // Angry brows
  var bc = d.brow ? '#ff4444' : 'transparent';
  document.getElementById('browL').setAttribute('stroke', bc);
  document.getElementById('browR').setAttribute('stroke', bc);
  // Label
  var lb = document.getElementById('lbl');
  lb.textContent = d.l || label;
  lb.style.color  = d.c || color;
  // Button highlight
  document.querySelectorAll('.btn').forEach(function(b){ b.classList.remove('on'); });
}

/* ─── AUTO CYCLE ─── */
var ALL     = ['idle','happy','vhappy','excited','laugh','greet','love','proud','confid','wink','talk','think','curious','confused','listen','proc','success','error','surp','shock','sad','cry','angry','sleep','thank','welc','d1','d2','d3','d4','d5','d6','d7','d8'];
var DANCES  = ['d1','d2','d3','d4','d5','d6','d7','d8'];
var EXPRS   = ['idle','happy','vhappy','excited','laugh','greet','love','proud','confid','wink','talk','think','curious','confused','listen','proc','success','error','surp','shock','sad','cry','angry','sleep','thank','welc'];

var tmr = null, autoOn = false, ai = 0;

function toggleAuto() {
  autoOn = !autoOn;
  document.getElementById('btnAuto').textContent = autoOn ? '⏸ Stop' : '▶ All States Cycle';
  if (autoOn) { ai = 0; runCycle(ALL); }
  else clearTimeout(tmr);
}
function runDance()  { autoOn=false; clearTimeout(tmr); ai=0; runCycle(DANCES,  true); }
function runExpr()   { autoOn=false; clearTimeout(tmr); ai=0; runCycle(EXPRS,   true); }

function runCycle(list, loop) {
  var s = list[ai]; var d = DATA[s] || DATA.idle;
  go(s, d.l, d.c);
  ai = (ai + 1) % list.length;
  var spd = s.charAt(0)==='d' ? 1600 : 2300;
  tmr = setTimeout(function(){ runCycle(list, loop); }, spd);
}
