<!DOCTYPE html>

<title>ATIKA — AI Mascot</title>

*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:0 0 28px}
.name{font-size:30px;font-weight:900;letter-spacing:.2em;color:#1e3a5f;margin:18px 0 2px}

function go(s,l,c){
  var sv=document.getElementById('sv');
  sv.className.baseVal='s-'+s;
  var d=D[s]||D.idle;
  document.getElementById('mo').setAttribute('d',d.m);
  document.getElementById('oN').style.opacity=d.N?'1':'0';
  document.getElementById('oH').style.opacity=d.H?'1':'0';
  document.getElementById('oQ').style.opacity=d.Q?'1':'0';
  document.getElementById('oS').style.opacity=d.S?'1':'0';
  document.getElementById('oZ').style.opacity=d.Z?'1':'0';
  document.getElementById('oT').style.opacity=d.T?'1':'0';
  document.getElementById('oP').style.opacity=d.P?'1':'0';
  document.getElementById('oC').style.opacity=d.C?'1':'0';
  var lb=document.getElementById('lbl');
  lb.textContent=d.l||l;lb.style.color=d.c||c;
}

var DANCES=['d1','d2','d3','d4','d5','d6','d7','d8'];
var EXPRS=['idle','happy','vhappy','laugh','greet','love','proud','confid','wink','talk','think','curious','confused','listen','proc','success','error','surp','shock','sad','cry','angry','sleep','thank','welc'];

var tmr=null,autoOn=false,ai=0;
function toggleAuto(){
  autoOn=!autoOn;
  document.getElementById('btnAuto').textContent=autoOn?'⏸ Stop Auto':'▶ Auto — All States';
  if(autoOn){ai=0;runAuto(ALL);}else clearTimeout(tmr);
}
function autoDance(){autoOn=false;clearTimeout(tmr);ai=0;runAuto(DANCES,true);}
function autoExpr(){autoOn=false;clearTimeout(tmr);ai=0;runAuto(EXPRS,true);}
function runAuto(lst,once){
  var s=lst[ai];var d=D[s]||D.idle;
  go(s,d.l,d.c);
  ai=(ai+1)%lst.length;
  var spd=s.indexOf('d')===0?1500:2200;
  tmr=setTimeout(function(){runAuto(lst,once);},spd);
}

go('idle','IDLE','#6366f1');
